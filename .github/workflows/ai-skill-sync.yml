name: ai-skill-sync

on:
  workflow_dispatch:
    inputs:
      target_models:
        description: "Comma-separated model adapters to validate or refresh."
        required: false
        default: "openai,claude,gemini"
      mode:
        description: "validate or refresh"
        required: true
        default: "validate"
        type: choice
        options:
          - validate
          - refresh
      fail_on_drift:
        description: "Fail validate mode when drift is detected."
        required: false
        default: true
        type: boolean

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Read canonical spec version
        id: spec
        shell: bash
        run: |
          version="$(sed -n 's/^- project_state_version: //p' .ai/skills/project-spec.md | head -n 1)"
          if [ -z "$version" ]; then
            echo "Unable to determine project_state_version from .ai/skills/project-spec.md" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Run skill sync
        id: sync
        uses: ./cross-model-skill-sync
        with:
          repo-root: .
          target-models: ${{ inputs.target_models }}
          mode: ${{ inputs.mode }}
          fail-on-drift: ${{ inputs.fail_on_drift }}

      - name: Detect generated changes
        id: changes
        if: always()
        shell: bash
        run: |
          if git diff --quiet -- .; then
            echo "hasChanges=false" >> "$GITHUB_OUTPUT"
          else
            echo "hasChanges=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Capture patch
        if: always()
        shell: bash
        run: |
          mkdir -p .ai/skills/reports
          git diff --binary -- . > .ai/skills/reports/ai-skill-sync.patch || true

      - name: Build pull request body
        if: ${{ inputs.mode == 'refresh' && steps.changes.outputs.hasChanges == 'true' }}
        shell: bash
        run: |
          report_path=".ai/skills/reports/ai-skill-sync-report.json"
          body_path=".ai/skills/reports/ai-skill-sync-pr-body.md"
          {
            echo "## AI Control Layer Sync"
            echo
            echo "**Canonical Spec Version**: v${{ steps.spec.outputs.version }}"
            echo
            echo "This PR regenerates:"
            echo "- Model adapters (OpenAI, Claude, Gemini)"
            echo "- Agent policies (primary, executor)"
            echo "- Governance artifacts (approval matrix, risk catalog, etc.)"
            echo
            echo "**Validation Report**:"
            echo '```json'
            cat "$report_path"
            echo '```'
            echo
            echo "**Review Checklist**:"
            echo "- [ ] Adapters match spec intent"
            echo "- [ ] Governance language is accurate"
            echo "- [ ] No unexpected file modifications"
            echo "- [ ] Ready to merge"
            echo
            echo "---"
            echo "Auto-generated by: AI Skill Sync"
          } > "$body_path"

      - name: Create pull request
        if: ${{ inputs.mode == 'refresh' && steps.changes.outputs.hasChanges == 'true' }}
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "chore: sync AI control layer to v${{ steps.spec.outputs.version }}"
          title: "chore: AI control layer sync v${{ steps.spec.outputs.version }}"
          body-path: .ai/skills/reports/ai-skill-sync-pr-body.md
          branch: ai-skill-sync/v${{ steps.spec.outputs.version }}
          delete-branch: true
          labels: |
            ai-skill-sync
            automated
            governance

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-skill-sync-report
          path: |
            .ai/skills/reports/ai-skill-sync-report.json
            .ai/skills/reports/ai-skill-sync.patch
            .ai/skills/reports/ai-skill-sync-pr-body.md
