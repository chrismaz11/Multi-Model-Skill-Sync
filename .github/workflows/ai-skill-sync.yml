name: AI Skill Sync

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "validate or refresh"
        required: false
        default: "validate"
        type: choice
        options:
          - validate
          - refresh
      target_models:
        description: "Comma-separated model adapters to sync"
        required: false
        default: "openai,claude,gemini"

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run AI skill sync
        id: sync
        uses: ./
        with:
          mode: ${{ inputs.mode }}
          target-models: ${{ inputs.target_models }}
          fail-on-drift: ${{ inputs.mode == 'validate' && 'true' || 'false' }}

      - name: Upload sync report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-skill-sync-report
          path: .ai/skills/reports/ai-skill-sync-report.json
          if-no-files-found: ignore

      - name: Open PR for refreshed files
        id: open-pr
        if: inputs.mode == 'refresh'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit — adapters already in sync."
            echo "pr_url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BRANCH="ai-skill-sync/refresh-$(date +%Y%m%d-%H%M%S)"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add .ai/ .agents/
          git commit -m "chore: AI control layer sync"
          git push origin "$BRANCH"

          REPORT_JSON=".ai/skills/reports/ai-skill-sync-report.json"
          REFRESHED=$(node -e "
            const r = JSON.parse(require('fs').readFileSync('$REPORT_JSON','utf8'));
            console.log(r.refreshedFiles.map(f => '- \`' + f + '\`').join('\n') || '_none_');
          " 2>/dev/null || echo "_unknown_")

          PR_BODY="## AI Skill Sync\n\nAutomated refresh of derived AI control files from the canonical project spec.\n\n### Refreshed files\n${REFRESHED}\n\n### Report\nDownload the \`ai-skill-sync-report\` artifact for the full JSON report."

          PR_URL=$(gh pr create \
            --title "chore: AI control layer sync" \
            --body "$(printf '%b' "$PR_BODY")" \
            --label "ai-sync" \
            --head "$BRANCH" \
            --base main 2>/dev/null || true)

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Write job summary
        if: always()
        run: |
          REPORT_JSON=".ai/skills/reports/ai-skill-sync-report.json"
          DRIFT="unknown"
          ERRORS=0
          WARNINGS=0
          CHECKS_PASSED=0
          CHECKS_TOTAL=0
          REFRESHED_COUNT=0

          if [ -f "$REPORT_JSON" ]; then
            DRIFT=$(node -e "const r=JSON.parse(require('fs').readFileSync('$REPORT_JSON','utf8')); console.log(r.driftDetected)" 2>/dev/null || echo "unknown")
            ERRORS=$(node -e "const r=JSON.parse(require('fs').readFileSync('$REPORT_JSON','utf8')); console.log(r.errors.length)" 2>/dev/null || echo 0)
            WARNINGS=$(node -e "const r=JSON.parse(require('fs').readFileSync('$REPORT_JSON','utf8')); console.log(r.warnings.length)" 2>/dev/null || echo 0)
            CHECKS_PASSED=$(node -e "const r=JSON.parse(require('fs').readFileSync('$REPORT_JSON','utf8')); console.log(r.checks.filter(c=>c.passed).length)" 2>/dev/null || echo 0)
            CHECKS_TOTAL=$(node -e "const r=JSON.parse(require('fs').readFileSync('$REPORT_JSON','utf8')); console.log(r.checks.length)" 2>/dev/null || echo 0)
            REFRESHED_COUNT=$(node -e "const r=JSON.parse(require('fs').readFileSync('$REPORT_JSON','utf8')); console.log(r.refreshedFiles.length)" 2>/dev/null || echo 0)
          fi

          DRIFT_ICON="✅"
          [ "$DRIFT" = "true" ] && DRIFT_ICON="⚠️"
          [ "$ERRORS" -gt 0 ] 2>/dev/null && DRIFT_ICON="❌"

          {
            echo "## $DRIFT_ICON AI Skill Sync"
            echo ""
            echo "| Field | Value |"
            echo "| ----- | ----- |"
            echo "| Mode | \`${{ inputs.mode }}\` |"
            echo "| Target models | \`${{ inputs.target_models }}\` |"
            echo "| Drift detected | \`$DRIFT\` |"
            echo "| Checks passed | \`$CHECKS_PASSED / $CHECKS_TOTAL\` |"
            echo "| Errors | \`$ERRORS\` |"
            echo "| Warnings | \`$WARNINGS\` |"
            echo "| Files refreshed | \`$REFRESHED_COUNT\` |"
            if [ -n "${{ steps.open-pr.outputs.pr_url }}" ]; then
              echo "| Pull request | ${{ steps.open-pr.outputs.pr_url }} |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
